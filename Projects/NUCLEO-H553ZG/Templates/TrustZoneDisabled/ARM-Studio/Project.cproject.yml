project:
  packs:
    - pack: ARM::CMSIS@6.3.0
    - pack: Keil::STM32H5xx_DFP@2.3.0-B01
    - pack: ARM::CMSIS-NN@^4.0.0
    - pack: ARM::CMSIS-DSP@^1.10.1
  setups:
    - setup: Options for NUCLEO_H553ZG_Templates_TrustZoneDisabled
      processor:
        fpu: sp
        trustzone: "off"
      add-path:
        - ../Inc
        - ../../../../../Drivers/CMSIS/Include
        - ../../../../../Drivers/CMSIS/Device/ST/STM32H5xx/Include
        - ../../../../../Drivers/STM32H5xx_HAL_Driver/Inc
        - ../../../../../Drivers/BSP/STM32H5xx_Nucleo
      debug: "on"
      define:
        - STM32H553xx
        - USE_HAL_DRIVER
      misc:
        - C:
            - -std=c11
          C-CPP:
            - -fno-rtti
            - -funsigned-char
            - -fshort-enums
            - -fshort-wchar
            - -ffunction-sections
            - -Wno-packed
            - -Wno-missing-variable-declarations
            - -Wno-missing-prototypes
            - -Wno-missing-noreturn
            - -Wno-sign-conversion
            - -Wno-nonportable-include-path
            - -Wno-reserved-id-macro
            - -Wno-unused-macros
            - -Wno-documentation-unknown-command
            - -Wno-documentation
            - -Wno-license-management
            - -Wno-parentheses-equality
          CPP:
            - -xc++
            - -std=c++11
            - -fno-exceptions
          ASM:
            - -masm=auto
          Link:
            - --map
            - --load_addr_map_info
            - --xref
            - --callgraph
            - --symbols
            - --info sizes
            - --info totals
            - --info unused
            - --info veneers
            - --strict
            - --summary_stderr
            - --info summarysizes
  linker:
    - script: Project_NUCLEO_H553ZG_Templates_TrustZoneDisabled.sct
  groups:
    - group: Doc
      files:
        - file: ../README.md
    - group: Drivers/CMSIS
      files:
        - file: ../Src/system_stm32h5xx.c
    - group: Drivers/STM32H5xx_HAL_Driver
